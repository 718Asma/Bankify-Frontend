<div class="login-wrap">

  <!-- Header -->
  <div class="login-header">
    <div class="header-ornament">
      <div class="orn-line"></div>
      <span class="orn-diamond">◆</span>
      <div class="orn-line"></div>
    </div>
    <h1 class="login-title">Connexion</h1>
    <p class="login-subtitle">Accédez à votre espace personnel</p>
  </div>

  <!-- Form -->
  <form class="login-form" (ngSubmit)="submit()" novalidate>

    <!-- CIN -->
    <div class="field-group" [class.has-error]="cin.invalid && cin.touched">
      <label class="field-label">Numéro CIN</label>
      <div class="field-input-wrap">
        <mat-icon class="field-icon">badge</mat-icon>
        <input
          class="field-input"
          type="text"
          inputmode="numeric"
          placeholder="Ex: 12345678"
          [formControl]="cin"
          autocomplete="username"
        />
      </div>
      <div class="field-error" *ngIf="cin.touched && cin.errors">
        <span *ngIf="cin.errors?.['required']">Le CIN est requis.</span>
        <span *ngIf="cin.errors?.['pattern']">Le CIN doit contenir uniquement des chiffres.</span>
      </div>
    </div>

    <!-- Password -->
    <div class="field-group" [class.has-error]="motDePasse.invalid && motDePasse.touched">
      <label class="field-label">Mot de passe</label>
      <div class="field-input-wrap">
        <mat-icon class="field-icon">lock_outline</mat-icon>
        <input
          class="field-input"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="••••••••"
          [formControl]="motDePasse"
          autocomplete="current-password"
        />
        <button
          type="button"
          class="toggle-pw"
          (click)="showPassword = !showPassword"
          [attr.aria-label]="showPassword ? 'Masquer' : 'Afficher'"
        >
          <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>
      <div class="field-error" *ngIf="motDePasse.touched && motDePasse.errors">
        <span *ngIf="motDePasse.errors?.['required']">Le mot de passe est requis.</span>
        <span *ngIf="motDePasse.errors?.['minlength']">Minimum 6 caractères.</span>
      </div>
    </div>

    <!-- Forgot password -->
    <div class="forgot-wrap">
      <a routerLink="/reset-password" class="forgot-link">Mot de passe oublié ?</a>
    </div>

    <!-- Submit -->
    <button class="btn-submit" type="submit" [disabled]="loading">
      <app-loading-spinner *ngIf="loading" />
      <span *ngIf="!loading">SE CONNECTER</span>
    </button>

  </form>

  <!-- Footer ornament -->
  <div class="login-footer">
    <div class="orn-line"></div>
  </div>

</div>
