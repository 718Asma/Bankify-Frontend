<div class="page-wrap">

  <!-- Page header -->
  <div class="page-header">
    <div class="header-ornament">
      <div class="orn-line"></div>
      <span class="orn-diamond">◆</span>
      <div class="orn-line"></div>
    </div>
    <h1 class="page-title">Changer le mot de passe</h1>
    <p class="page-subtitle">Sécurisez votre compte avec un nouveau mot de passe</p>
  </div>

  <!-- Card -->
  <div class="card">
    <div class="card-accent"></div>

    <form class="form" (ngSubmit)="submit()" novalidate>

      <!-- Current password -->
      <div class="field-group" [class.has-error]="current.invalid && current.touched">
        <label class="field-label">Mot de passe actuel</label>
        <div class="field-input-wrap">
          <mat-icon class="field-icon">lock_outline</mat-icon>
          <input
            class="field-input"
            [type]="show.current ? 'text' : 'password'"
            placeholder="••••••••"
            [formControl]="current"
            autocomplete="current-password"
          />
          <button type="button" class="toggle-pw" (click)="show.current = !show.current">
            <mat-icon>{{ show.current ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <div class="field-error" *ngIf="current.touched && current.errors?.['required']">
          Le mot de passe actuel est requis.
        </div>
      </div>

      <div class="field-divider"></div>

      <!-- New password -->
      <div class="field-group" [class.has-error]="newPw.invalid && newPw.touched">
        <label class="field-label">Nouveau mot de passe</label>
        <div class="field-input-wrap">
          <mat-icon class="field-icon">lock_reset</mat-icon>
          <input
            class="field-input"
            [type]="show.newPw ? 'text' : 'password'"
            placeholder="••••••••"
            [formControl]="newPw"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-pw" (click)="show.newPw = !show.newPw">
            <mat-icon>{{ show.newPw ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <div class="field-error" *ngIf="newPw.touched && newPw.errors">
          <span *ngIf="newPw.errors?.['required']">Le nouveau mot de passe est requis.</span>
          <span *ngIf="newPw.errors?.['minlength']">Minimum 6 caractères.</span>
        </div>
      </div>

      <!-- Confirm password -->
      <div class="field-group" [class.has-error]="(confirm.invalid && confirm.touched) || mismatch">
        <label class="field-label">Confirmer le mot de passe</label>
        <div class="field-input-wrap">
          <mat-icon class="field-icon">verified_user</mat-icon>
          <input
            class="field-input"
            [type]="show.confirm ? 'text' : 'password'"
            placeholder="••••••••"
            [formControl]="confirm"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-pw" (click)="show.confirm = !show.confirm">
            <mat-icon>{{ show.confirm ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
        <div class="field-error" *ngIf="confirm.touched && confirm.errors?.['required']">
          La confirmation est requise.
        </div>
        <div class="field-error" *ngIf="mismatch">
          Les mots de passe ne correspondent pas.
        </div>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn-submit" [disabled]="loading">
          <app-loading-spinner *ngIf="loading" />
          <span *ngIf="!loading">ENREGISTRER</span>
        </button>
      </div>

    </form>
  </div>

</div>
