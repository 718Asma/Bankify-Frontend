<nav class="navbar">

  <!-- Left: Brand -->
  <div class="navbar-brand">
          <div class="brand-icon">
            <img src="assets/logo-no.png" alt="logo" />
          </div>
          <span class="brand-name">BANKIFY</span>
        </div>

  <!-- Center: decorative -->
  <div class="navbar-center">
    <div class="divider-line"></div>
    <span class="divider-diamond">◆</span>
    <div class="divider-line"></div>
  </div>

  <!-- Right: Actions -->
  <div class="navbar-actions">

    <!-- Notification bell -->
    <div class="notif-wrapper" (click)="$event.stopPropagation()">
      <button mat-icon-button class="icon-btn" matTooltip="Notifications" (click)="toggleNotifPanel($event)">
        <mat-icon class="nav-icon">notifications_none</mat-icon>
        <span class="notif-dot" *ngIf="notifCount > 0"></span>
        <span class="notif-badge" *ngIf="notifCount > 0">{{ notifCount > 99 ? '99+' : notifCount }}</span>
      </button>

      <!-- Notification panel -->
      <div class="notif-panel" *ngIf="notifPanelOpen">
        <!-- Panel accent line -->
        <div class="panel-accent"></div>

        <!-- Header -->
        <div class="panel-header">
          <div class="panel-title-wrap">
            <mat-icon class="panel-title-icon">notifications_none</mat-icon>
            <span class="panel-title">Notifications</span>
          </div>
          <span class="panel-count" *ngIf="notifCount > 0">{{ notifCount }}</span>
        </div>

        <!-- Empty state -->
        <div class="panel-empty" *ngIf="notifications.length === 0">
          <mat-icon>notifications_off</mat-icon>
          <span>Aucune notification</span>
        </div>

        <!-- Notifications list -->
        <div class="panel-list" *ngIf="notifications.length > 0">
          <div class="notif-item" *ngFor="let notif of notifications">
            <div class="notif-icon-wrap">
              <mat-icon class="notif-icon">info_outline</mat-icon>
            </div>
            <div class="notif-body">
              <p class="notif-contenu">{{ notif.contenu }}</p>
              <span class="notif-date">{{ notif.dateCreation | date:'dd/MM/yyyy' }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- User menu -->
    <button class="user-chip" [matMenuTriggerFor]="userMenu">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-info">
        <span class="user-name">{{ fullName }}</span>
        <span class="user-role">{{ user?.role }}</span>
      </div>
      <mat-icon class="chevron-icon">expand_more</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu" class="navbar-menu" xPosition="before">
      <button mat-menu-item (click)="goToProfile()">
        <mat-icon>person_outline</mat-icon>
        <span>Mon profil</span>
      </button>
      <button mat-menu-item routerLink="/app/profile/change-password">
        <mat-icon>lock_outline</mat-icon>
        <span>Changer mot de passe</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="logout-item">
        <mat-icon>logout</mat-icon>
        <span>Déconnexion</span>
      </button>
    </mat-menu>

  </div>
</nav>
