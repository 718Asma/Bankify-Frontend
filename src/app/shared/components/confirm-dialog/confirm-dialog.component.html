<div class="dialog-shell">

  <!-- Gold top accent -->
  <div class="dialog-accent"></div>

  <!-- Header -->
  <div class="dialog-header">
    <div class="dialog-icon" [class.warn]="variant === 'warn'">
      <mat-icon>{{ variant === 'warn' ? 'warning_amber' : 'help_outline' }}</mat-icon>
    </div>
    <h2 class="dialog-title">{{ data.title }}</h2>
  </div>

  <!-- Message -->
  <div class="dialog-body">
    <p class="dialog-message">{{ data.message }}</p>
  </div>

  <!-- Actions -->
  <div class="dialog-actions">
    <button class="btn-cancel" (click)="cancel()">{{ cancelLabel }}</button>
    <button
      class="btn-confirm"
      [class.warn]="variant === 'warn'"
      (click)="confirm()"
    >{{ confirmLabel }}</button>
  </div>

</div>
